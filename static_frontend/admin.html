<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1f1f1f;
            --accent-color: #e50914;
            --text-color: #f2f2f2;
            --secondary-text: #bbb;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            padding-bottom: 50px;
        }

        .navbar {
            background-color: var(--card-bg) !important;
            border-bottom: 1px solid var(--border-color);
        }

        .navbar-brand {
            color: var(--accent-color) !important;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .nav-tabs {
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 25px;
            gap: 5px;
        }

        .nav-link {
            color: var(--secondary-text);
            border: none !important;
            border-bottom: 3px solid transparent !important;
            padding: 12px 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--text-color);
        }

        .nav-link.active {
            background-color: transparent !important;
            color: var(--accent-color) !important;
            border-bottom: 3px solid var(--accent-color) !important;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .card-header {
            background-color: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            padding: 15px 20px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
        }

        .btn-primary:hover {
            background-color: #b20710;
        }

        .btn-outline-light {
            border-color: var(--border-color);
            color: var(--secondary-text);
        }

        .btn-outline-light:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
        }

        .form-control, .form-select {
            background-color: #2a2a2a !important;
            border: 1px solid #444 !important;
            color: #fff !important;
            padding: 10px 15px;
            border-radius: 8px;
        }

        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 0.25rem rgba(229, 9, 20, 0.25) !important;
            border-color: var(--accent-color) !important;
        }

        .list-group-item {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
            border-radius: 10px !important;
            transition: transform 0.2s ease;
        }

        .list-group-item:hover {
            transform: translateY(-2px);
            background-color: #252525;
        }

        .badge-type {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-loader {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .modal-content {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid #444;
            border-radius: 15px;
        }

        .modal-header {
            border-bottom: 1px solid #444;
            padding: 20px;
        }

        .modal-footer {
            border-top: 1px solid #444;
            padding: 20px;
        }

        #notification {
            z-index: 2000;
            min-width: 250px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Pagination Styles */
        .btn-outline-light {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--secondary-text);
            padding: 8px 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-outline-light:hover:not(:disabled) {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            transform: translateY(-1px);
        }

        .btn-outline-light:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: var(--border-color);
        }

        #files-page-info, #comments-page-info {
            background-color: var(--bg-color) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--secondary-text) !important;
            font-weight: 500;
            padding: 8px 12px !important;
        }

        /* Responsive horizontal tabs scroll */
        @media (max-width: 768px) {
            .nav-tabs {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                padding-bottom: 5px;
            }
            .nav-item {
                white-space: nowrap;
            }
            .card-header {
                padding: 12px 15px;
            }
            .btn-sm-mobile {
                padding: 5px 10px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-shield-lock-fill me-2"></i>Admin Panel
            </a>
            <div class="d-flex">
                <button class="btn btn-outline-light btn-sm" onclick="location.reload()">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="notification" style="display:none; position:fixed; top:20px; right:20px; padding:15px; border-radius:10px; color:white; font-weight:bold;"></div>

        <ul class="nav nav-tabs" id="adminTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="files-tab" data-bs-toggle="tab" data-bs-target="#files-pane" type="button" role="tab">
                    <i class="bi bi-file-earmark-play me-2"></i>Files
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="comments-tab" data-bs-toggle="tab" data-bs-target="#comments-pane" type="button" role="tab">
                    <i class="bi bi-chat-dots me-2"></i>Comments
                </button>
            </li>
        </ul>

        <div class="tab-content" id="adminTabsContent">
            <!-- Files Tab -->
            <div class="tab-pane fade show active" id="files-pane" role="tabpanel">
                <div class="card shadow-sm">
                    <div class="card-header">Files Library</div>
                    <div class="card-body">
                        <div class="row g-3 mb-4">
                            <div class="col-md-5">
                                <div class="input-group">
                                    <span class="input-group-text bg-dark border-secondary text-secondary">
                                        <i class="bi bi-search"></i>
                                    </span>
                                    <input type="search" id="file-search" class="form-control" placeholder="Search by filename...">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <select id="channel-filter" class="form-select">
                                    <option value="">All Channels/Categories</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="no-poster-url-filter">
                                    <label class="form-check-label small text-secondary" for="no-poster-url-filter">No Poster URL</label>
                                </div>
                            </div>
                        </div>
                        <ul id="files-list" class="list-group list-group-flush mb-4"></ul>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <button id="files-prev" class="btn btn-outline-light btn-sm">
                                <i class="bi bi-chevron-left me-1"></i>Previous
                            </button>
                            <span id="files-page-info" class="badge bg-dark border border-secondary p-2">Page 1</span>
                            <button id="files-next" class="btn btn-outline-light btn-sm">
                                Next<i class="bi bi-chevron-right ms-1"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Comments Tab -->
            <div class="tab-pane fade" id="comments-pane" role="tabpanel">
                <div class="card shadow-sm">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>User Feedback</span>
                    </div>
                    <div class="card-body">
                        <ul id="comments-list" class="list-group list-group-flush mb-4"></ul>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <button id="comments-prev" class="btn btn-outline-light btn-sm">
                                <i class="bi bi-chevron-left me-1"></i>Previous
                            </button>
                            <span id="comments-page-info" class="badge bg-dark border border-secondary p-2">Page 1</span>
                            <button id="comments-next" class="btn btn-outline-light btn-sm">
                                Next<i class="bi bi-chevron-right ms-1"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->

    <!-- Edit Poster Modal -->
    <div class="modal fade" id="editPosterModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-image me-2"></i>Edit File Poster</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="edit-file-id">
                    <div class="mb-3">
                        <label class="form-label small text-secondary">Poster URL (External)</label>
                        <input type="url" id="edit-poster-url" class="form-control" placeholder="https://example.com/image.jpg">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="update-poster-btn" class="btn btn-primary" onclick="updateFilePoster()">Update Poster</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Comment Modal -->
    <div class="modal fade" id="editCommentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-chat-left-text me-2"></i>Edit Comment</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="edit-comment-id">
                    <div class="mb-3">
                        <label class="form-label small text-secondary">Comment Text</label>
                        <textarea id="edit-comment-text" class="form-control" rows="5"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="update-comment-btn" class="btn btn-primary" onclick="updateComment()">Save Comment</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script>
        // —————————————— State Management ——————————————
        let filesCurrentPage = 1;
        let commentsCurrentPage = 1;
        let fileSearchQuery = '';
        let noPosterUrlFilter = false;
        let channelFilter = '';
        
        // Modal Instances
        let posterModalInstance;
        let commentModalInstance;

        async function verifyAdmin() {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = 'admin_login.html';
                return false;
            }
            const authHeader = { 'Authorization': `Bearer ${token}` };
            try {
                const r = await fetch(`${API_BASE_URL}/api/user/verify`, { headers: authHeader });
                if (!r.ok) {
                    window.location.href = 'admin_login.html';
                    return false;
                }
                return true;
            } catch (e) {
                window.location.href = 'admin_login.html';
                return false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            posterModalInstance = new bootstrap.Modal(document.getElementById('editPosterModal'));
            commentModalInstance = new bootstrap.Modal(document.getElementById('editCommentModal'));
            
            verifyAdmin().then(authorized => {
                if (authorized) {
                    loadChannels();
                    loadFiles();
                    loadAdminComments();
                }
            });
        });

        // —————————————— Utility Functions ——————————————
        function debounce(func, delay) {
            let timeout;
            return function(...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), delay);
            };
        }

        // —————————————— File Functions ——————————————
        async function loadFiles() {
            const list = document.getElementById('files-list');
            list.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-danger" role="status"></div></div>';
            
            let url = `${API_BASE_URL}/api/admin/files?page=${filesCurrentPage}`;
            if (fileSearchQuery) url += `&search=${encodeURIComponent(fileSearchQuery)}`;
            if (noPosterUrlFilter) url += `&no_poster_url=true`;
            if (channelFilter) url += `&channel_id=${channelFilter}`;

            const response = await fetchWithAuth(url);
            if (!response || !response.ok) {
                list.innerHTML = '<div class="text-center py-4 text-danger">Failed to load files.</div>';
                return;
            }
            const data = await response.json();
            
            list.innerHTML = '';
            if (data.files.length === 0) {
                list.innerHTML = '<div class="text-center py-4 text-secondary">No files found.</div>';
            }

            data.files.forEach(file => {
                const item = document.createElement('li');
                item.className = 'list-group-item d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center py-3 px-3';
                
                const mainDiv = document.createElement('div');
                mainDiv.className = 'd-flex flex-column align-items-start mb-2 mb-md-0 flex-grow-1';
                
                const textDiv = document.createElement('div');
                textDiv.className = 'w-100';
                textDiv.innerHTML = `
                    <div class="d-flex align-items-center">
                        <div class="text-white fw-medium" style="word-break: break-all;">${file.file_name}</div>
                    </div>
                `;
                
                mainDiv.appendChild(textDiv);
                item.appendChild(mainDiv);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'd-flex gap-2 ms-md-3';

                const posterBtn = document.createElement('button');
                posterBtn.className = 'btn btn-sm btn-outline-info btn-sm-mobile';
                posterBtn.innerHTML = '<i class="bi bi-image me-1"></i>Poster';
                posterBtn.onclick = () => openPosterModal(file);
                actionsDiv.appendChild(posterBtn);


                const delBtn = document.createElement('button');
                delBtn.className = 'btn btn-sm btn-outline-danger btn-sm-mobile';
                delBtn.innerHTML = '<i class="bi bi-trash"></i>';
                delBtn.onclick = async () => {
                    if (!confirm('Delete this file?')) return;
                    await deleteFile(file.id);
                };
                actionsDiv.appendChild(delBtn);

                item.appendChild(actionsDiv);
                list.appendChild(item);
            });

            document.getElementById('files-page-info').textContent = `Page ${data.current_page} of ${data.total_pages || 1}`;
            document.getElementById('files-prev').disabled = data.current_page <= 1;
            document.getElementById('files-next').disabled = data.current_page >= data.total_pages;
        }
        
        async function deleteFile(fileId) {
            try {
                const response = await fetchWithAuth(`${API_BASE_URL}/api/admin/files/${fileId}`, { method: 'DELETE' });
                if (response && response.ok) {
                    showNotification('File deleted!');
                    loadFiles();
                } else showNotification('Delete failed.', true);
            } catch (error) { console.error(error); }
        }
        
        function openPosterModal(file) {
            document.getElementById('edit-file-id').value = file.id;
            document.getElementById('edit-poster-url').value = file.poster_url || '';
            posterModalInstance.show();
        }

        async function updateFilePoster() {
            const btn = document.getElementById('update-poster-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="btn-loader"></div> Saving...';

            const fileId = document.getElementById('edit-file-id').value;
            const posterUrl = document.getElementById('edit-poster-url').value;
            try {
                const response = await fetchWithAuth(`${API_BASE_URL}/api/admin/files/${fileId}`, {
                    method: 'PUT',
                    body: JSON.stringify({ poster_url: posterUrl })
                });

                if (response && response.ok) {
                    showNotification('Poster updated!');
                    posterModalInstance.hide();
                    loadFiles();
                } else showNotification('Update failed.', true);
            } catch (error) { console.error(error); } 
            finally { btn.disabled = false; btn.innerHTML = originalText; }
        }
        
        // —————————————— Comment Functions ——————————————
        async function loadAdminComments() {
            const list = document.getElementById('comments-list');
            list.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-danger" role="status"></div></div>';
            
            const response = await fetchWithAuth(`${API_BASE_URL}/api/admin/comments?page=${commentsCurrentPage}`);
            if (!response || !response.ok) return;
            const data = await response.json();
            
            list.innerHTML = '';
            if (data.comments.length === 0) {
                list.innerHTML = '<div class="text-center py-4 text-secondary">No comments found.</div>';
            }

            data.comments.forEach(comment => {
                const item = document.createElement('li');
                item.className = 'list-group-item p-3';
                item.innerHTML = `
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <strong class="text-info">${comment.user_name}</strong>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-warning" onclick="openCommentModal('${comment._id}', \`${comment.comment.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="handleDeleteComment('${comment._id}', this)"><i class="bi bi-trash"></i></button>
                        </div>
                    </div>
                    <div class="text-secondary small mb-0">${comment.comment}</div>
                `;
                list.appendChild(item);
            });

            document.getElementById('comments-page-info').textContent = `Page ${data.current_page} of ${data.total_pages || 1}`;
            document.getElementById('comments-prev').disabled = data.current_page <= 1;
            document.getElementById('comments-next').disabled = data.current_page >= data.total_pages;
        }

        async function handleDeleteComment(commentId, btn) {
            if (!confirm('Delete comment?')) return;
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="btn-loader"></div>';
            try {
                const response = await fetchWithAuth(`${API_BASE_URL}/api/admin/comments/${commentId}`, { method: 'DELETE' });
                if (response && response.ok) {
                    showNotification('Comment deleted!');
                    loadAdminComments();
                } else showNotification('Delete failed.', true);
            } finally { btn.disabled = false; btn.innerHTML = originalContent; }
        }

        function openCommentModal(id, text) {
            document.getElementById('edit-comment-id').value = id;
            document.getElementById('edit-comment-text').value = text;
            commentModalInstance.show();
        }

        async function updateComment() {
            const btn = document.getElementById('update-comment-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="btn-loader"></div> Saving...';

            const id = document.getElementById('edit-comment-id').value;
            const text = document.getElementById('edit-comment-text').value;
            try {
                const response = await fetchWithAuth(`${API_BASE_URL}/api/admin/comments/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ comment: text })
                });
                if (response && response.ok) {
                    showNotification('Comment updated!');
                    commentModalInstance.hide();
                    loadAdminComments();
                } else showNotification('Update failed.', true);
            } finally { btn.disabled = false; btn.innerHTML = originalText; }
        }

        // —————————————— Initial Load & Listeners ——————————————
        async function loadChannels() {
            const response = await fetchWithAuth(`${API_BASE_URL}/api/admin/channels`);
            if (!response || !response.ok) return;
            const channels = await response.json();
            const select = document.getElementById('channel-filter');
            channels.forEach(channel => {
                const option = document.createElement('option');
                option.value = channel.channel_id;
                option.textContent = channel.channel_name;
                select.appendChild(option);
            });
        }
        
        // Listeners
        const debouncedLoadFiles = debounce(loadFiles, 600);
        document.getElementById('file-search').addEventListener('input', (e) => {
            fileSearchQuery = e.target.value;
            filesCurrentPage = 1;
            debouncedLoadFiles();
        });

        document.getElementById('no-poster-url-filter').addEventListener('change', (e) => {
            noPosterUrlFilter = e.target.checked;
            filesCurrentPage = 1;
            loadFiles();
        });

        document.getElementById('channel-filter').addEventListener('change', (e) => {
            channelFilter = e.target.value;
            filesCurrentPage = 1;
            loadFiles();
        });

        document.getElementById('files-prev').addEventListener('click', () => {
            if (filesCurrentPage > 1) { filesCurrentPage--; loadFiles(); }
        });

        document.getElementById('files-next').addEventListener('click', () => {
            filesCurrentPage++; loadFiles();
        });

        document.getElementById('comments-prev').addEventListener('click', () => {
            if (commentsCurrentPage > 1) { commentsCurrentPage--; loadAdminComments(); }
        });

        document.getElementById('comments-next').addEventListener('click', () => {
            commentsCurrentPage++; loadAdminComments();
        });
    </script>
</body>
</html>
